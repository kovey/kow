version: "2"

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - unconvert
    - nilerr
    - prealloc

  settings:
    misspell:
      locale: US
    goimports:
      local-prefixes: github.com/kovey/kow

  exclusions:
    paths:
      - tests
      - vendor
